<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SA'Y{% endblock %}</title>
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              bg:      '#07111F',
              surf:    '#0B1628',
              card:    '#122038',
              accent:  '#7CFF4F',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-brand-bg text-gray-800 dark:text-gray-200 min-h-screen">

  {% block content %}{% endblock %}

</body>
</html>
