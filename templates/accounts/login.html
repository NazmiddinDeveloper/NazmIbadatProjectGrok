{% extends 'base.html' %}
{% block title %}Kirish{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-green-500 dark:bg-brand-accent flex items-center justify-center text-white dark:text-black font-bold text-2xl mx-auto mb-4">S</div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Xush kelibsiz</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Davom etish uchun kiring</p>
    </div>

    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Foydalanuvchi nomi</label>
        <input type="text" name="username" required autofocus
          class="w-full px-4 py-3 rounded-xl bg-white dark:bg-brand-card border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-500 dark:focus:ring-brand-accent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Parol</label>
        <input type="password" name="password" required
          class="w-full px-4 py-3 rounded-xl bg-white dark:bg-brand-card border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-500 dark:focus:ring-brand-accent">
      </div>

      {% if form.errors %}
      <p class="text-red-500 text-sm">Foydalanuvchi nomi yoki parol noto'g'ri.</p>
      {% endif %}

      <button type="submit"
        class="w-full py-3 rounded-xl bg-green-500 dark:bg-brand-accent text-white dark:text-black font-bold hover:opacity-90 transition">
        Kirish
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
      Akkaunt yo'qmi?
      <a href="{% url 'register' %}" class="text-green-600 dark:text-brand-accent font-medium hover:underline">Ro'yxatdan o'ting</a>
    </p>

  </div>
</div>
{% endblock %}
